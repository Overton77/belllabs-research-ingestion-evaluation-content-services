error:
  type: dependency
  category: import-error
  pattern: "cannot import name SandboxClientProvider from temporalio.contrib.openai_agents.sandbox"
  context: "Temporal OpenAI Agents worker"
diagnosis:
  root_cause: "The public symbol is re-exported from temporalio.contrib.openai_agents, not its sandbox package."
solution:
